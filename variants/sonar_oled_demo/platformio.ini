; sonar_oled_demo -- live median-filtered MB7388 range + battery on the SSD1306 OLED.
; Adds the Adafruit SSD1306/GFX stack to the SPI+TinyUSB base (Wire needs TinyUSB; SSD1306 needs GFX+BusIO).
[env:sonar_oled_demo]
extends = nrf52_base
board = promicro_nrf52840
lib_deps =
  SPI
  Wire
  Adafruit TinyUSB Library
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit GFX Library
  adafruit/Adafruit BusIO
lib_ldf_mode = chain+
build_flags = ${nrf52_base.build_flags}
  -I variants/rook
  -D PIN_OLED_RESET=-1
  -D SSD1306_NO_SPLASH
build_src_filter =
  -<*>
  +<../variants/rook/variant.cpp>
  +<../variants/sonar_oled_demo/sonar_oled_demo_main.cpp>
