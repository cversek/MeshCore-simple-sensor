[Rook]
extends = nrf52_base
board = promicro_nrf52840
extra_scripts =
  ${nrf52_base.extra_scripts}
  post:variants/rook/create-uf2-post.py
build_flags = ${nrf52_base.build_flags}
  -I variants/rook
  -D ROOK_BOARD
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D PIN_BOARD_SCL=7
  -D PIN_BOARD_SDA=8
  -D PIN_OLED_RESET=-1
  -D PIN_USER_BTN=6   ; Arduino pin 6 = P1.00 (Rook v4 BUTTON_A)
  -D PIN_GPS_RX=PIN_SERIAL1_RX
  -D PIN_GPS_TX=PIN_SERIAL1_TX
  -D PIN_GPS_EN=-1
  -D ENV_INCLUDE_GPS=1
  -D ENV_INCLUDE_AHTX0=1
  -D ENV_INCLUDE_BME280=1
  -D ENV_INCLUDE_BMP280=1
build_src_filter = ${nrf52_base.build_src_filter}
  +<helpers/sensors>
  +<../variants/rook>
lib_deps = ${nrf52_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit AHTX0 @ ^2.0.5
  adafruit/Adafruit BME280 Library @ ^2.3.0
  adafruit/Adafruit BMP280 Library @ ^2.6.8
  stevemarple/MicroNMEA @ ^2.0.6

[env:Rook_sensor_broadcast]
extends = Rook
build_flags = ${Rook.build_flags}
  -I examples/simple_sensor
  -D ADVERT_NAME='"Rook Sensor Bcast"'
  -D ADMIN_PASSWORD='"password"'
  -D BROADCAST_INTERVAL_SECS=30
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter = ${Rook.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_sensor/SensorMesh.cpp>
  +<../examples/simple_sensor/TimeSeriesData.cpp>
  +<../examples/simple_sensor/UITask.cpp>
  +<../examples/sensor_broadcast/main.cpp>
lib_deps = ${Rook.lib_deps}

[env:Rook_companion_radio_usb]
extends = Rook
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${Rook.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${Rook.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${Rook.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:Rook_companion_radio_ble]
extends = Rook
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
