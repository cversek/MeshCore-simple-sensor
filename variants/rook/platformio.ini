[env:Rook_ultrasonic_probe]
; Minimal bring-up firmware: USB CDC + Serial1 only, no MeshCore.
; Use to verify the MaxBotix MB7388 is actually producing 'Rdddd\r' frames.
; Boots fast, no key prompt, no display, no LoRa.
extends = Rook
build_src_filter = ${Rook.build_src_filter}
  +<../examples/ultrasonic_probe/main.cpp>
lib_deps = ${Rook.lib_deps}

[env:Rook_companion_sensor_v3_ultrasonic]
; v3 sensor (OLED ACK status + page-flip on send) with MaxBotix MB7388
; ultrasonic distance sensor → distance_meters → Bayou.
; Wiring: MB7388 pin 5 (TTL serial out) → Rook Serial1 RX
;         (schematic pin 2 / silkscreen RX1 / P0.08 / Arduino D0).
;         MB7388 pin 6 (V+, 2.7–5.5V) → Rook 3V3 (or BAT for longer range margin).
;         MB7388 pin 7 (GND) → Rook GND.
;         MB7388 pin 4 (RX/strobe) left floating → continuous mode at ~6 Hz.
extends = Rook
build_flags = ${Rook.build_flags}
  -D MAX_CONTACTS=32
  -D ADVERT_NAME='"Sensor"'
  -D SENSOR_SEND_INTERVAL_SECS=300
  -D DISPLAY_CLASS=SSD1306Display
  -D LORA_FREQ=910.525
  -D LORA_BW=62.5
  -D LORA_SF=7
  -D LORA_CR=5
build_src_filter = ${Rook.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/v3-ultrasonic/companion_sensor>
lib_deps = ${Rook.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:Rook_companion_sensor_v3_ultrasonic_debug]
; Radio-link debug build of the v3-ultrasonic sensor node. Same source as
; Rook_companion_sensor_v3_ultrasonic plus:
;   SEND_TIMER_MILLIS  -> send fires off millis() so packets repeat every
;                         interval even without a GPS/NTP clock (the RTC path
;                         caps at one boot packet). Lets the OLED tx/ack counters
;                         actually climb so a one-and-done wedge is watchable.
; The source itself adds the LED-per-TX heartbeat, the tx/ack counters, and the
; always-on display. Reproducible flash target -- no ephemeral -D flags.
extends = env:Rook_companion_sensor_v3_ultrasonic
build_flags = ${env:Rook_companion_sensor_v3_ultrasonic.build_flags}
  -D SEND_TIMER_MILLIS

[env:Rook_companion_sensor_v3_1_wire]
; v3-style sensor (OLED ACK status + page-flip on send + Send-page live read
; + verbose boot prints) with DS18B20 OneWire temperature probe → temperature_c → Bayou.
; Wiring: DS18B20 data → Rook Arduino D9 = P1.06 = schematic pin 12.
;         DS18B20 V+ → 3V3, GND → GND. 4.7k pull-up between data and 3V3.
extends = Rook
build_flags = ${Rook.build_flags}
  -D MAX_CONTACTS=32
  -D ONEWIRE_PIN=9
  -D ADVERT_NAME='"Sensor"'
  -D SENSOR_SEND_INTERVAL_SECS=300
  -D DISPLAY_CLASS=SSD1306Display
  -D LORA_FREQ=910.525
  -D LORA_BW=62.5
  -D LORA_SF=7
  -D LORA_CR=5
build_src_filter = ${Rook.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/v3-1-wire/companion_sensor>
lib_deps = ${Rook.lib_deps}
  adafruit/RTClib @ ^2.1.3
  paulstoffregen/OneWire @ ^2.3.8
  milesburton/DallasTemperature @ ^3.9.0

[env:Rook_repeater]
extends = Rook
build_src_filter = ${Rook.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags =
  ${Rook.build_flags}
  -D ADVERT_NAME='"Rook Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D DISPLAY_CLASS=SSD1306Display
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps = ${Rook.lib_deps}
  adafruit/RTClib @ ^2.1.3
