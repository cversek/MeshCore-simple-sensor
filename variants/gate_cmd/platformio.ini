; gate_cmd -- battery voltage read + commanded single-shot ranging (pin4/D1 strobe).
; Uses ZERO external libs: variant.cpp is a pin-map, gate_cmd_main.cpp is Arduino.h
; only, USB-CDC Serial is core-provided. RadioLib was cargo-culted from the radio
; siblings; on a cold .pio the floating ^7.3.0 resolved to 7.7.1 and failed on SPI.h.
; USB-CDC Serial = Adafruit_USBD_CDC, from the bundled Adafruit TinyUSB Library.
; TinyUSB also ships a USB-Host source that #includes SPI.h, so SPI must be present
; too (the full MeshCore build has it via arduino_base; minimizing had dropped it).
[env:gate_cmd]
extends = nrf52_base
board = promicro_nrf52840
lib_deps =
  SPI
  Adafruit TinyUSB Library
lib_ldf_mode = chain+
build_flags = ${nrf52_base.build_flags}
  -I variants/rook
  -D USE_MEDIAN=1   ; 1 = median-filter the ranging samples; 0 = raw single reading (debug A/B)
  -D N_SAMPLES=5    ; samples per measurement when USE_MEDIAN
build_src_filter =
  -<*>
  +<../variants/rook/variant.cpp>
  +<../variants/gate_cmd/gate_cmd_main.cpp>
