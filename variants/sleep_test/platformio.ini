; Minimal deep-sleep env for JS220 sleep-current profiling on the Rook (promicro_nrf52840).
; Reuses the project's known-good board def (S140 v6 ldscript) + the rook Arduino-core variant
; (variant.h via -I, pin map via variant.cpp) + the nrf52_base UF2 scripts. v4 adds RadioLib so
; the SX1262 can be put to SPI sleep (POWER_EN low alone left the radio core in standby ~1 mA).
[env:sleep_test]
extends = nrf52_base
board = promicro_nrf52840
lib_deps = jgromes/RadioLib @ ^7.3.0
lib_ldf_mode = chain+
build_flags = ${nrf52_base.build_flags}
  -I variants/rook
build_src_filter =
  -<*>
  +<../variants/rook/variant.cpp>
  +<../variants/sleep_test/sleep_main.cpp>

; ---- System-ON build-up ladder (additive on the v4 146.6 uA anchor)

[env:sleep_test_v5_systemon]
; B1 -- THE bridge build: System ON delay(1000) idle instead of SYSTEMOFF, radio
; warm-slept, USBD off once VBUS gone. Measures the bare core's System-ON floor.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1

[env:sleep_test_v5_usbd]
; B2: B1 + USBD left enabled on battery -- cross-checks the deployment build's null result.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V5_USBD_ON=1

[env:sleep_test_v5_prints]
; B3: B1 + per-loop Serial prints on battery (CDC writes, no host).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V5_PRINTS=1

[env:sleep_test_v5_fsrtc]
; B4: B1 + InternalFS.begin -- the flash service cost in isolation.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V5_FSRTC=1

[env:sleep_test_v5_d21low]
; B5: B1 + D21/P0.13 driven LOW -- the clone EXT-VCC pull-up A/B (~+0.6 mA
; expected if the SuperMini-style 5.6 k is populated).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V5_D21_LOW=1

; ---- idle-surgery builds (v6, all single-delta vs B1) ----

[env:sleep_test_v6_audit]
; D1: B1 + battery-state audit latch (clock/peripheral ENABLEs, idle-hook rate)
; dumped over CDC on USB replug. The cut list for the surgery ladder comes from
; this arm's readout, not from theory.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_AUDIT=1

[env:sleep_test_v6_spim3off]
; X_spim3: B1 + spiLora.end() after radio.sleep(). nRF52840 anomaly 195 is
; ~900 uA continuous while SPIM3 is ENABLED -- the number matches the whole
; gap. endTransaction() may already have disabled it (audit says); cheap knob.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_SPIM3_OFF=1

[env:sleep_test_v6_hfclkstop]
; X_hfclk: B1 + TASKS_HFCLKSTOP from the (weak-override) idle hook when VBUS
; is absent -- directly tests the nobody-ever-stops-HFXO code fact.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_HFCLKSTOP=1

[env:sleep_test_v6_usbsuspend]
; X_usbtask: B1 + vTaskSuspend the TinyUSB "usbd" task once VBUS is gone
; (found by name via the trace facility; the core discards the handle).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_USBTASK_SUSPEND=1

; [env:sleep_test_v6_nousb] -- REMOVED (build-verified impossible 2026-07-20):
; the core does not compile without USE_TINYUSB (main.cpp _write and Uart.cpp
; serialEventRun reference the CDC Serial object unconditionally). Fallback per
; protocol: sleep_test_v6_usbsuspend + B1's USBD ENABLE=0 is the closest
; achievable cut without core edits. V6_NOUSB knob left in sleep_main.cpp.

[env:sleep_test_v6_audit2]
; D2: audit + DWT CYCCNT awake-cycles-per-second latch -- direct measurement of
; how much the WFE micro-loop actually sleeps. Pure diagnostic, no cuts.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_AUDIT=1
  -D V6_AUDIT2=1

[env:sleep_test_v6_lowpwr]
; X_lowpwr: B1 + TASKS_LOWPWR once VBUS drops -- insurance against a latched
; constant-latency mode (write-only task, no status readback exists).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_LOWPWR=1

[env:sleep_test_v6_timerstop]
; X_timer: B1 + TASKS_STOP/SHUTDOWN on TIMER0-4 at setup. Timers are
; audit-blind (no ENABLE readback) and a running one holds HFCLK through CPU
; sleep; the UF2 bootloader is the suspected starter.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_TIMERSTOP=1

[env:sleep_test_v6_audit3]
; D3: audit2 + blind-spot registers (GPIOTE configs, CC310, QDEC, COMP,
; LPCOMP, AAR, CCM, MWU regions, RADIO state).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_AUDIT=1
  -D V6_AUDIT2=1
  -D V6_AUDIT3=1

[env:sleep_test_v6_sd]
; X_sd: B1 + Bluefruit.begin() -- SoftDevice-managed sleep. The port prefers
; sd_app_evt_wait() when S140 is ENABLED; this is the config-level test of
; whether the bare-metal WFE branch is the ~890 uA defect.
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_SD=1

[env:sleep_test_v6_resleep]
; X_resleep: B1 + radio.sleep() every loop pass. Discriminates "radio stays
; asleep" (floor unchanged, radio innocent) from "runtime wakes the radio"
; (floor collapses; the earlier radio-not-slept 1.05 mA matches our exact gap).
extends = env:sleep_test
build_flags = ${env:sleep_test.build_flags}
  -D V5_SYSTEMON=1
  -D V6_RESLEEP=1
