; sonar_field_node -- duty-cycle water-level deployment firmware.
; Forks the v3-ultrasonic companion_sensor mesh node and layers the field-node
; mode machine (modes.h) on top: POST/STATUS/SLEEP/WAKE/MEASURE/TRANSMIT + the
; B1 dev views (DEMO / TRANSMIT_DEBUG). Defaults to the low-power deploy cycle.
[env:Rook_field_node]
extends = Rook
build_flags = ${Rook.build_flags}
  -I variants/sonar_field_node
  -D DISPLAY_CLASS=SSD1306Display
  -D LORA_FREQ=910.525        ; US ISM (Edgewood, RI) -- must match the receiver
  -D LORA_SF=7
  -D SENSOR_SEND_INTERVAL_SECS=300
build_src_filter = ${Rook.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../variants/sonar_field_node/sonar_field_node_main.cpp>
lib_deps = ${Rook.lib_deps}

[env:Rook_field_node_bench]
; Bench/verify build of the deployment field node: same firmware as
; Rook_field_node with a SHORT duty cycle so the measure/transmit/LED-health and
; STATUS tx-fail behavior is observable in seconds, not the 5-min deploy cadence.
; (Lesson learned the hard way: control the test interval so behavior is watchable.) Flash
; Rook_field_node for the real deployment; this only overrides the cadence macros.
extends = env:Rook_field_node
build_flags = ${env:Rook_field_node.build_flags}
  -D CYCLE_SECS=20
  -D STATUS_SECS=15

[env:Rook_field_node_bench_sonaroff]
; Diagnostic: same short-cycle bench build but the sonar gate is FORCED OFF the
; whole time (SONAR_FORCE_OFF). Isolation test -- if the link ACKs with the sonar
; never powered, the sonar's gated power/RF noise is desensing the radio RX even
; though the fault register stays clean. Not a deploy build.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SONAR_FORCE_OFF

[env:Rook_field_node_bench_uartsleep]
; Attribution control for the 2026-07-18 sleep-floor result. Same short-cycle
; bench build, but SLEEP_RELEASE_UART=0 leaves UARTE0 enabled across MODE_SLEEP
; the way the firmware behaved before that change. Expect the sleep floor to
; climb back from ~1.07 mA to ~6.6 mA. If it does not, the improvement was NOT
; the UART release and the attribution is wrong. A fix that cannot be un-fixed
; has not been attributed -- this env is how the claim gets falsified on demand.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RELEASE_UART=0

[env:Rook_field_node_bench_dcdc]
; !!! DO NOT FLASH WITHOUT CONFIRMING THE MODULE'S DC/DC INDUCTORS !!!
;
; 2026-07-18: flashing this (via the combined _lowpower env) preceded the node
; dropping off the USB bus. The nRF52840 DC/DC needs external inductors on the
; DCC pins; without them the regulator cannot supply the core and the chip
; browns out and will not boot. Recovery is a power cycle + bootloader reflash
; (DCDCEN is volatile), but it costs a physical trip to the bench.
;
; The earlier claim that RookBoard skipping NRF52BoardDCDC::begin() is a "bug" is
; RETRACTED. Across this repo the boards that call it are purpose-built low-power
; designs (rak4631, rak3401, xiao_nrf52, wio_*, t1000-e, sensecap_solar, meshtiny,
; gat562); the boards that inherit it and deliberately call NRF52Board::begin()
; include mesh_pocket, thinknode_m6, ikoka x3, rook -- and PROMICRO. The Rook is a
; ProMicro nRF52840 module and MeshCore's own promicro variant skips it the same
; way. That is a defensive pattern, because clone modules vary on whether the
; inductors are fitted. Confirm the hardware before ever enabling this.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D PWR_ENABLE_DCDC=1

[env:Rook_field_node_bench_twi]
; Power candidate B: release TWIM across sleep. Wire.begin() runs once in
; RookBoard::begin() and is never ended, so the I2C peripheral stays enabled and
; holds HFCLK -- the same class of leak the UART turned out to be. The display is
; already off in SLEEP, so nothing needs the bus there.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RELEASE_TWI=1

[env:Rook_field_node_bench_lowpower]
; !!! CARRIES THE DC/DC RISK -- see the _dcdc env warning above. Do not flash
; until the module's DC/DC inductors are confirmed. Use _twi for the safe half.
;
; Both candidates together. Measure the singles FIRST so each stays attributable;
; this env is for the combined figure once they are individually understood.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D PWR_ENABLE_DCDC=1
  -D SLEEP_RELEASE_TWI=1

[env:Rook_field_node_bench_slowpoll]
; Power candidate C: wake less often during sleep.
; MODE_SLEEP calls delay(SLEEP_POLL_MS) purely to re-check the cadence clock and
; the button. At the 50 ms default that is 20 CPU wakes per second doing nothing.
; The arithmetic points here rather than at a peripheral: 147 uA was measured with
; the radio slept and the MCU in System-OFF, versus ~1066 uA now with the radio
; slept and the MCU in System-ON idle. The ~900 uA difference is idle overhead.
; Trade-off: button latency during sleep rises to ~1 s, and cadence granularity to
; ~1 s. Both are irrelevant against a 20 s bench or 300 s deployment cycle.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_POLL_MS=1000

[env:Rook_field_node_bench_radiopower]
; Power candidate D: also drop SX126X_POWER_EN during sleep.
; The radio's supply gate is driven HIGH once in RookBoard::begin() and never
; touched, so the TCXO + RF-switch domain stays powered even while the SX1262 is
; SPI-slept. the sleep_test ladder priced that domain at ~1.77 mA, and our current 1.06 mA
; floor sits close to the earlier 1.05 mA "POWER_EN low, not yet SPI-slept" rung.
; Wake must cold re-init (radio_init/std_init) since power loss discards config.
; NOT the operation that hung before -- those were begin() against a chip still in
; SPI-sleep; this is a cold power-up, the normal boot path. Verify ACK over serial
; with USB IN before trusting any battery-only capture from this build.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RADIO_POWER_OFF=1

[env:Rook_field_node_bench_radiogate]
; Power candidate E: gate the radio supply AND tri-state every line into it first.
; The plain _radiopower arm (gate without tri-state) measured 1.0595 -> 3.2120 mA,
; a 3x REGRESSION at 300 sigma: with VCC gated, the MCU kept driving NSS/SCK/MOSI/
; RXEN/DIO into a dead chip and back-powered it through its protection diodes.
; This arm releases SPIM and hi-Zs all eight lines before dropping POWER_EN, then
; restores SPI + cold-inits on wake. If the TCXO/RF-switch domain really is
; still costing us, this is the arm that can collect it without the sneak path.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RADIO_POWER_OFF=1
  -D SLEEP_RADIO_TRISTATE=1

[env:Rook_field_node_bench_pindisc]
; Diagnostic (radio-gate + disconnected lines): radiogate, but the eight radio lines go to the nRF52's
; buffer-disconnected reset state (PIN_CNF INPUT=Disconnect) instead of Arduino
; INPUT. The tri-state arm recovered only half the gating regression (3.212 ->
; 2.102 mA, still +1.04 mA vs the radio-powered 1.060 mA floor); a floating pin
; with its input buffer connected conducts near threshold, and pinMode(INPUT)
; leaves the buffer connected. Single delta vs _radiogate: SLEEP_RADIO_PIN_DISCONNECT.
; Success = below 1.060 mA (gating finally nets a saving). Verify sonar cycling +
; TX/ACK over serial with USB IN before any battery capture.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RADIO_POWER_OFF=1
  -D SLEEP_RADIO_TRISTATE=1
  -D SLEEP_RADIO_PIN_DISCONNECT=1

[env:Rook_field_node_bench_pinaudit]
; Diagnostic (pad audit): radio left powered (slowpoll baseline), but the listed
; non-radio pads (sonar strobe D1, sonar RX D0) are buffer-disconnected during
; sleep instead of left INPUT/floating. Single delta vs _slowpoll:
; SLEEP_PIN_DISCONNECT_AUDIT. Success = >= 50 uA below the 1.060 mA floor.
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_PIN_DISCONNECT_AUDIT=1

[env:Rook_field_node_bench_pindisc_audit]
; Diagnostic: the two above combined -- radio gated with disconnected lines AND
; the non-radio pad audit. The sub-mA-without-architecture-fork stretch arm.
; NOT RUN: falsified by implication when the disconnect diagnostic showed the
; gating residual is not pin-state-controllable.
extends = env:Rook_field_node_bench
build_flags = ${env:Rook_field_node_bench.build_flags}
  -D SLEEP_RADIO_POWER_OFF=1
  -D SLEEP_RADIO_TRISTATE=1
  -D SLEEP_RADIO_PIN_DISCONNECT=1
  -D SLEEP_PIN_DISCONNECT_AUDIT=1

[env:Rook_field_node_bench_diag]
; Diagnostic: slowpoll behavior plus a one-line state dump at each sleep
; entry (SoftDevice? USBD? HFCLK? FPU pending? RXEN/NSS levels). Decides which
; surgery candidates matter before any battery capture. Bench-only.
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_DIAG=1

[env:Rook_field_node_bench_usbd]
; Surgery candidate (USBD): disable USBD during battery sleep. The Adafruit core
; enables USBD unconditionally; enabled USBD holds HFCLK (~1 mA-class classic
; floor signature). Fires only when USBREGSTATUS shows no VBUS, so USB bench
; flows are untouched. Single delta vs _slowpoll: SLEEP_DISABLE_USBD.
; Prediction: removes >= 400 uA of the ~910 uA System-ON gap.
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_DISABLE_USBD=1

[env:Rook_field_node_bench_radiosleepfix]
; Surgery candidate (radio sleep sequence): corrected sequence -- standby() -> clear all
; radio IRQs -> sleep(true), then RXEN driven LOW and NSS parked driven-HIGH.
; radio.sleep() straight from Rx with a pending IRQ can strand the die in
; STANDBY (600-800 uA; RadioLib #1736 on this same module combo). Single delta
; vs _slowpoll: SLEEP_RADIO_SEQ_FIX. Prediction: -55 uA (die was sleeping,
; RF-switch tranche only) or -600..800 uA (die was stranded).
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_RADIO_SEQ_FIX=1

[env:Rook_field_node_bench_fpuclear]
; Surgery candidate (Errata 87): FPU-pending clear before each sleep poll.
; Promoted from contingent to required by the diagnostic dump (2026-07-20): fpu_pend=1 at every
; sleep entry -- WFE falls through, idle task spins. Single delta vs _slowpoll.
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_FPU_CLEAR=1

[env:Rook_field_node_bench_hfclkstop]
; Surgery candidate (HFXO): stop the HFXO at battery sleep entry. Motivated by the
; null sweep of the other candidates + the diagnostic hfclkstat=0x10001: the crystal runs through sleep and
; nothing we disabled released it. Boot-on-USB latches an HFCLK request that no
; battery-side event releases; this stops the clock directly (VBUS-gated).
; Single delta vs _slowpoll. Prediction: if the latched HFXO owns the ~900 uA
; gap, the floor collapses toward the ~150-250 uA band.
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_HFCLK_STOP=1

[env:Rook_field_node_bench_usbd_radiofix]
; Surgery combo: USBD + radio-sequence + FPU-clear together. Target: sleep floor
; < 400 uA (stretch < 250 uA) with TX/ACK link health intact. Board hardware
; floor is ~147 uA (sleep_test v4).
extends = env:Rook_field_node_bench_slowpoll
build_flags = ${env:Rook_field_node_bench_slowpoll.build_flags}
  -D SLEEP_DISABLE_USBD=1
  -D SLEEP_RADIO_SEQ_FIX=1
  -D SLEEP_FPU_CLEAR=1

; ---- Strip-down ladder (cumulative; adjacent deltas attribute layers)

[env:Rook_field_node_bench_strip_display]
; S1: hfclkstop config minus the OLED (begin guarded, on/off stubbed). ACK alive-check.
extends = env:Rook_field_node_bench_hfclkstop
build_flags = ${env:Rook_field_node_bench_hfclkstop.build_flags}
  -D STRIP_DISPLAY=1

[env:Rook_field_node_bench_strip_sonar]
; S2: + sonar lifecycle removed (helpers no-op, probe skipped, gate held off). ACK.
extends = env:Rook_field_node_bench_hfclkstop
build_flags = ${env:Rook_field_node_bench_hfclkstop.build_flags}
  -D STRIP_DISPLAY=1
  -D STRIP_SONAR=1

[env:Rook_field_node_bench_strip_mesh]
; S3: + no the_mesh.begin/loop, no mode machine; radio init then immediate warm
; sleep (v4 pattern); bare heartbeat idle loop. InternalFS still begins.
; Alive-check = [HB] heartbeat (cannot ACK).
extends = env:Rook_field_node_bench_hfclkstop
build_flags = ${env:Rook_field_node_bench_hfclkstop.build_flags}
  -D STRIP_DISPLAY=1
  -D STRIP_SONAR=1
  -D STRIP_MESH=1
  -D HEARTBEAT=1

[env:Rook_field_node_bench_strip_fs]
; S4: + no InternalFS.begin. (FS cannot be stripped below the mesh -- the_mesh
; needs it -- hence mesh strips first; this delta attributes the filesystem.)
extends = env:Rook_field_node_bench_hfclkstop
build_flags = ${env:Rook_field_node_bench_hfclkstop.build_flags}
  -D STRIP_DISPLAY=1
  -D STRIP_SONAR=1
  -D STRIP_MESH=1
  -D STRIP_FS=1
  -D HEARTBEAT=1
