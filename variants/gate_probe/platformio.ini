; gate_probe -- diagnostic for a "powered but silent" sonar. Power-cycles the sonar
; each loop (clears a wedge), then tests continuous (pin4 float) and commanded
; (D1-driven-high) modes back to back, printing frame + raw byte counts for each.
; Same known-good minimal deps as gate_cmd (SPI + Adafruit TinyUSB, no RadioLib).
[env:gate_probe]
extends = nrf52_base
board = promicro_nrf52840
lib_deps =
  SPI
  Adafruit TinyUSB Library
lib_ldf_mode = chain+
build_flags = ${nrf52_base.build_flags}
  -I variants/rook
build_src_filter =
  -<*>
  +<../variants/rook/variant.cpp>
  +<../variants/gate_probe/gate_probe_main.cpp>
